---
name: Tests

on:
    push:
        branches: [ master, wip ]
    pull_request:
        branches: [ master ]
    schedule:
        # Every Monday at 00:00:00 UTC.
        # @see https://crontab.cronhub.io/
        -   cron: "0 0 * * 1"

jobs:
    build:
        name: "PHP ${{ matrix.php }}"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ["8.3", "8.4", "8.5"]
        steps:
            -   name: "Set up PHP"
                uses: shivammathur/setup-php@v2 # https://github.com/marketplace/actions/setup-php-action
                with:
                    php-version: "${{ matrix.php }}"

            -   name: "Checkout code"
                uses: actions/checkout@v4 # https://github.com/marketplace/actions/checkout

            -   name: "Install dependencies"
                uses: ramsey/composer-install@v3 # https://github.com/marketplace/actions/install-composer-dependencies
                with:
                    composer-options: "--no-cache"

            -   name: "Run PHPUnit"
                run: php ./vendor/bin/phpunit

            -   name: "Run Behat (PHP floor)"
                if: matrix.php == '8.3'
                run: |
                    php ./vendor/bin/behat -c tests/behat.yml --no-interaction --format=progress
                    php ./vendor/bin/behat -c examples/behat.yml --no-interaction --format=progress

            -   name: "Run Static Analysis"
                if: matrix.php == '8.3'
                run: |
                    php ./vendor/bin/phpcs -s
                    php ./vendor/bin/phpstan analyze
                    php ./vendor/bin/rector --dry-run
                    composer validate
                    composer normalize --dry-run
                    composer dump-autoload --optimize --dry-run --strict-psr --strict-ambiguous
